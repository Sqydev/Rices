general {
	hide_cursor = true
	immediate_render = true
	fail_timeout = 2000
}

auth {
	pam:enabled = true
	fingerprint:enabled = false
}

animations {
	enabled = false
}

background {
    monitor =
    color = rgb(0, 0, 0)
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.1
    dots_spacing = 0.5
    outer_color = rgb(0, 0, 0)
	fail_color = rgb(0, 0, 0)
	check_color = rgb(0, 0, 0)
    inner_color = rgb(0, 0, 0)
    font_color = rgb(200, 200, 200)
	font_family = FiraCode Nerd Font
    fade_on_empty = false
	placeholder_text = It's Locked
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
